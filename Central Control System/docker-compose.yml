services:
  utilsservice:
    container_name: utilsservice
    build:
      context: ./UtilsService/
      dockerfile: Dockerfile
    ports:
      - "7089:8080" 
      - "5031:8080"
    depends_on:
      - postgresql-server
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
  authservice:
    container_name: authservice
    build:
      context: ./AuthService/
      dockerfile: Dockerfile
    ports:
      - "5107:8080" 
      - "7224:8080"
    depends_on:
      - postgresql-server
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
  operationsservice:
    container_name: operationsservice
    build:
      context: ./OperationsService/
      dockerfile: Dockerfile
    ports:
      - "7088:8080" 
      - "5160:8080"
    depends_on:
      - postgresql-server
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
  postgresql-server:
    container_name: postgresql-server
    build:
      context: .
      dockerfile: sql.Dockerfile